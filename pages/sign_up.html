    <!-- Navbar -->
    <nav>
      <section class="nav-content">
        <figure class="nav-logo">
          <a href="../index.html"><img src="../img/ZooChip - logo.png" alt=""></a>
        </figure>
      <div class="mobile-menu">
        <div class="line1"></div>
        <div class="line2"></div>
        <div class="line3"></div>
      </div>
        <section>

      <aside class="aside-links">
        <ul>
          <li><a href="sign_in.html" id="sign_in">Sign in</a></li>
          <li><a href="sign_up.html" id="sign_up">Sign up</a></li>
        </ul>
      </aside>
    </nav>

    <main class="container">
      <div class="register-container">
        <h2>Cadastrar</h2>
          <form id="registerForm">
              <div class="input-group">
                  <label for="CompanyName"> </label>
                  <input type="text" id="companyname" name="companyname" placeholder="Nome da empresa" required>
              </div>
              <div class="input-group">
                  <label for="CPF"> </label>
                  <input type="number" id="CPF" name="CPF" placeholder="CPF" required>
              </div>
              <div class="input-group">
                <label for="endereco"> </label>
                <input type="text" id="endereco" name="endereco" placeholder="Endereço" required>
              </div>
              <div class="input-group">
                <label for="email"> </label>
                <input type="text" id="email" name="email" placeholder="Email" required>
              </div>
              <div class="input-group">
                <label for="password"> </label>
                <input type="password" id="password" name="password" placeholder="Senha" required>
              </div>  
            <button type="submit" class="button">Crie a sua conta</button>
          </form>
        <div class="links-register">
            <a href="../pages/sign_in.html" id="registerLink">Já tem uma conta? Entrar</a>
        </div>
    </div>
    <script src="escriptao.js"></script>

    </main>
